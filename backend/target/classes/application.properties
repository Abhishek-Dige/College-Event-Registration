# Run on port 8080 (default)
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# We are using createDatabaseIfNotExist=true so the database is created automatically if it doesn't exist
spring.datasource.url=jdbc:mysql://localhost:3306/event_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Configuration
# update: automatically updates the database schema based on the entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# ALTERNATIVE: H2 IN-MEMORY DB
# ===============================
# If you don't have MySQL installed and just want it to work INSTANTLY without any setup,
# COMMENT the MySQL configuration above and UNCOMMENT the lines below:

# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
